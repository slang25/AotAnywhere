name: Deploy site

# Builds the Astro site in site/ and publishes it to GitHub Pages.
# Enable Pages first: repo Settings → Pages → Build and deployment →
# Source: "GitHub Actions".
on:
  push:
    branches: [ master ]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-site.yml'
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# One concurrent deploy; let an in-progress run finish so a Pages deployment
# is never interrupted mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
      - name: Build with Astro
        uses: withastro/action@v6
        with:
          path: site
          # Astro 7 requires Node >=22.12.0; the action defaults to Node 20.
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
