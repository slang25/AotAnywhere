name: Cross-Platform Validation

on:
  pull_request:
    branches: [ master ]
    # Docs/site-only changes can't affect the cross-OS matrix, so skip the
    # (expensive) validation for them. Keep in sync with main.yml.
    paths-ignore:
      - 'site/**'
      - 'docs/**'
      - '**/*.md'
      - 'LICENSE.TXT'
      - '.github/workflows/deploy-site.yml'
  # No push: trigger. A merged PR's tree was already validated on the PR, so
  # re-running the full cross-OS matrix on the merge commit only doubled the
  # spend for no new signal. For an extra pre-release sweep, dispatch manually
  # (optionally with full_matrix=true).
  workflow_dispatch:
    inputs:
      full_matrix:
        description: 'Build from every host platform (adds the macOS x64 and Linux arm64 hosts on top of the default windows/linux/macos-arm64 set)'
        type: boolean
        default: false
  # Available for on-demand full-matrix runs (e.g. a manual pre-release check).
  # The release workflow (publish.yml) no longer calls this.
  workflow_call:
    inputs:
      full_matrix:
        type: boolean
        default: false

# A new push to the same PR supersedes the running validation; cancel it so
# stacked runs don't starve the limited macOS runner pool. Manual dispatch/call
# runs are never cancelled, only coalesced in the queue.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # rcodesign (https://github.com/indygreg/apple-platform-rs) generates the
  # test signing certificate, signs macOS binaries during the build matrix
  # (via the AotAnywhere signing properties) and verifies the results.
  # Deliberately NOT named RCODESIGN_*: rcodesign feeds env vars with that
  # prefix into its config loader and errors on unknown keys.
  APPLE_CODESIGN_VERSION: 0.29.0

jobs:
  # Unit-test the MSBuild link logic (activation flags, target-triple mapping,
  # macOS DirectLink argument reconstruction) via the Microsoft.Build APIs -
  # no zig, no ILCompiler restore, no linking. Guards the arg-framing coupling
  # that the DirectLink flow trades for transparency: e.g. that the macOS line
  # never carries GNU-ld gc-sections/discard-all (a past startup-crash bug) and
  # that Swift-runtime links still get their overlay libs. Runs via `dotnet run`
  # (the test app is a Microsoft.Testing.Platform executable).
  msbuild-logic-tests:
    runs-on: depot-ubuntu-latest
    name: MSBuild logic unit tests
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - name: Run MSBuild logic tests
        run: dotnet run --project tests/AotAnywhere.MSBuild.Tests/AotAnywhere.MSBuild.Tests.csproj -c Release

  # Consume the package the way real users do — installed from a feed into a
  # clean NuGet cache. test/Hello.csproj (used by the build matrix) imports
  # src/*.targets directly, which makes the package's Zig toolset reference a
  # first-class project reference restore can see; a real consumer gets it
  # from inside the installed package, where restore cannot (NuGet/Home#4790).
  # This job guards that gap: SDK-element consumption must work zero-config
  # from a cold cache, and plain-PackageReference consumption must fail with
  # the actionable error. One host is enough — the restore-graph behavior
  # under test is host-independent.
  package-consumption:
    runs-on: depot-ubuntu-latest
    name: Package consumption (clean NuGet cache)
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - name: Test package consumption from a clean NuGet cache
        run: bash .github/scripts/test-package-consumption.sh linux-x64

  # Generate a throwaway self-signed Developer ID-style certificate that the
  # build jobs use to exercise the signing integration. Generated once here:
  # rcodesign emits a PEM pair, and Ubuntu's OpenSSL converts it to a PKCS#12
  # file with -legacy — the PFX encryption rcodesign can read back.
  test-cert:
    runs-on: depot-ubuntu-latest
    name: Generate test signing certificate
    steps:
      - name: Generate self-signed signing certificate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "apple-codesign/$APPLE_CODESIGN_VERSION" \
            -R indygreg/apple-platform-rs \
            -p "apple-codesign-$APPLE_CODESIGN_VERSION-x86_64-unknown-linux-musl.tar.gz"
          tar xzf apple-codesign-*.tar.gz --strip-components=1
          mkdir test-cert
          ./rcodesign generate-self-signed-certificate \
            --person-name "AotAnywhere CI Test" \
            --profile developer-id-application \
            --pem-filename test-cert/cert
          openssl pkcs12 -export -legacy \
            -inkey test-cert/cert.key -in test-cert/cert.crt \
            -out test-cert/cert.p12 -passout pass:citest
          printf citest > test-cert/cert.pass
          rm test-cert/cert.key test-cert/cert.crt
      - name: Upload test certificate
        uses: actions/upload-artifact@v7
        with:
          name: test-signing-cert
          path: test-cert/

  # Choose which host platforms build the matrix. Cross-compilation output is
  # driven by the *target* triple, not the host's own OS/arch, so the default
  # set carries one host per host-OS family - windows, linux (x64) and macos
  # (arm64) - which is enough to prove "you can cross-compile from each OS".
  # The extra same-OS hosts (macOS x64, Linux arm64) only re-prove host-arch
  # independence, so they run on demand: dispatch/call with full_matrix=true
  # (e.g. a pre-release sweep). Either way every host still builds all ten
  # targets and every target is still validated natively - only the set of
  # build *hosts* narrows.
  setup:
    runs-on: depot-ubuntu-latest
    name: Select host matrix
    outputs:
      build-matrix: ${{ steps.select.outputs.build-matrix }}
      host-sources: ${{ steps.select.outputs.host-sources }}
    steps:
      - name: Select build hosts
        id: select
        shell: bash
        env:
          FULL_MATRIX: ${{ inputs.full_matrix }}
        run: |
          if [ "$FULL_MATRIX" = "true" ]; then
            echo "Selected full host matrix (all five hosts)."
            echo 'build-matrix={"include":[{"host":"depot-windows-latest","host-name":"windows"},{"host":"depot-ubuntu-latest","host-name":"linux"},{"host":"macos-15-intel","host-name":"macos-x64"},{"host":"depot-macos-latest","host-name":"macos-arm64"},{"host":"depot-ubuntu-24.04-arm","host-name":"linux-arm64"}]}' >> "$GITHUB_OUTPUT"
            echo 'host-sources=windows,linux,macos-x64,macos-arm64,linux-arm64' >> "$GITHUB_OUTPUT"
          else
            echo "Selected minimal host matrix (windows, linux, macos-arm64)."
            echo 'build-matrix={"include":[{"host":"depot-windows-latest","host-name":"windows"},{"host":"depot-ubuntu-latest","host-name":"linux"},{"host":"depot-macos-latest","host-name":"macos-arm64"}]}' >> "$GITHUB_OUTPUT"
            echo 'host-sources=windows,linux,macos-arm64' >> "$GITHUB_OUTPUT"
          fi

  # Build matrix: every host builds all ten targets; the target list lives
  # in the parallel build steps below (grouped glibc/musl/macOS/Windows). The
  # host set is chosen by the setup job (minimal by default, full on demand).
  build:
    needs: [test-cert, setup]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.build-matrix) }}

    runs-on: ${{ matrix.host }}
    name: Build from ${{ matrix.host-name }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      # SDK 9 is needed on top of 8 because the armv7 targets publish as
      # net9.0 (their ILCompiler runtime packs only ship for .NET 9+), and
      # SDK 10 because win-arm64 publishes as net10.0 to exercise the newest
      # Windows link.rsp shape; the other targets keep the net8.0 floor.
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      # The publishes below restore the Vezel zig toolset for this host plus
      # ILCompiler/runtime packs for all eight target RIDs - several hundred
      # MB from nuget.org on every run without this cache. build-targets.sh
      # gives each concurrent group its own NuGet folders under
      # $RUNNER_TEMP/nuget (see below), so cache that whole tree.
      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ${{ runner.temp }}/nuget
          key: nuget-publish-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('src/AotAnywhere.nuproj', 'src/Crosscompile.targets', 'test/Hello.csproj', 'test/HelloLib/HelloLib.csproj') }}
          restore-keys: |
            nuget-publish-${{ runner.os }}-${{ runner.arch }}-

      - name: Download test signing certificate
        uses: actions/download-artifact@v8
        with:
          name: test-signing-cert
          path: test-cert

      # The osx-x64 publishes below sign via the AotAnywhere rcodesign
      # integration, so every build host needs rcodesign on PATH.
      - name: Install rcodesign
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64)         asset="x86_64-unknown-linux-musl.tar.gz" ;;
            Linux-aarch64)        asset="aarch64-unknown-linux-musl.tar.gz" ;;
            Darwin-*)             asset="macos-universal.tar.gz" ;;
            MINGW*|MSYS*|CYGWIN*) asset="x86_64-pc-windows-msvc.zip" ;;
            *) echo "No rcodesign asset for $(uname -s)-$(uname -m)"; exit 1 ;;
          esac
          mkdir .rcodesign && cd .rcodesign
          gh release download "apple-codesign/$APPLE_CODESIGN_VERSION" \
            -R indygreg/apple-platform-rs \
            -p "apple-codesign-$APPLE_CODESIGN_VERSION-$asset"
          if [[ "$asset" == *.zip ]]; then
            unzip -q apple-codesign-*.zip || python -m zipfile -e apple-codesign-*.zip .
          else
            tar xzf apple-codesign-*.tar.gz
          fi
          mv apple-codesign-*/rcodesign* .
          ./rcodesign --version

      # coreclr keeps its cross-process named mutexes in a per-login-session dir,
      # /tmp/.dotnet/shm/session<id>, at a FIXED path TMPDIR can't relocate. When
      # that dir doesn't exist yet, concurrent dotnet processes race to mkdir it
      # and the loser dies with `errno == EEXIST` ("NuGet-Migrations") - which is
      # exactly what the three parallel publish groups below would hit on a cold
      # runner. Run one dotnet up front (a no-RID restore creates the mutex, and
      # thus the session dir); the concurrent groups then find it and skip the
      # racy mkdir. No-op on Windows, which has no such shm dir.
      - name: Warm coreclr shared memory
        shell: bash
        run: dotnet restore test/Hello.csproj

      # The Windows link goes through the managed AotAnywhereWindowsLink task
      # (one portable netstandard2.0 DLL). Build it once here, serially, so the
      # source-consumption publishes below resolve $(AotAnywhereTasksAssembly)
      # via the dev fallback (DirectLink.targets) and the parallel groups never
      # race on its output directory.
      - name: Build link task
        shell: bash
        run: dotnet build src/tasks/AotAnywhere.Tasks/AotAnywhere.Tasks.csproj -c Release

      # The ten publishes are independent, so run them as four concurrent
      # streams (Actions parallel steps). Four streams - not ten - because
      # the hosted runners have 3-4 cores and ILC is memory-hungry; grouping
      # keeps them saturated without thrashing. build-targets.sh gives each
      # target its own intermediate dir so the concurrent publishes of the
      # shared test project don't race on obj/. A failed group surfaces at
      # the implicit wait after the whole group finishes, so every target
      # still gets attempted and uploaded.
      - parallel:
          # All Linux targets link via the direct zig invocation (the only
          # Linux link flow; the clang shim hard-errors if a Linux link
          # reaches it). The extra linux-x64 variants, spread across the
          # groups to keep the four streams balanced at 4/3/2/3:
          #   linux-x64-selftest - net10.0, real ICU/zlib/OpenSSL,
          #                        exercised at run time
          #   lib-linux-x64      - NativeLib=Shared library
          - name: Build glibc Linux targets
            shell: bash
            run: bash .github/scripts/build-targets.sh "${{ matrix.host-name }}" "linux-x64,linux-arm64,linux-arm,linux-x64-selftest"
          - name: Build musl Linux targets
            shell: bash
            run: bash .github/scripts/build-targets.sh "${{ matrix.host-name }}" "linux-musl-x64,linux-musl-arm64,linux-musl-arm"
          - name: Build macOS targets
            shell: bash
            run: bash .github/scripts/build-targets.sh "${{ matrix.host-name }}" "osx-x64,osx-arm64"
          - name: Build Windows targets and linux shared library
            shell: bash
            run: bash .github/scripts/build-targets.sh "${{ matrix.host-name }}" "win-x64,win-arm64,lib-linux-x64"


      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        if: always()  # Upload artifacts even if some builds failed
        with:
          name: binaries-${{ matrix.host-name }}
          path: artifacts/${{ matrix.host-name }}/
          retention-days: 7

  # Validation: Test running the built binaries where possible
  validate:
    needs: [build, setup]
    if: always() # Run even if some builds failed
    strategy:
      fail-fast: false
      matrix:
        include:
          # Test x64 binaries on Ubuntu x64. The decorated linux-x64 variants
          # cover the shared library (lib-) loaded via ctypes and the
          # selftest binary (real ICU, zlib, OpenSSL) run natively on the
          # runner.
          - runner: depot-ubuntu-latest
            runner-name: ubuntu-x64
            test-targets: "linux-x64,linux-musl-x64,lib-linux-x64,linux-x64-selftest"
          # Test ARM64 binaries on Ubuntu ARM64 (now runnable on hosted ARM runners)
          - runner: depot-ubuntu-24.04-arm
            runner-name: ubuntu-arm64
            test-targets: "linux-arm64,linux-musl-arm64"
          # Test ARMv7 binaries under QEMU on Ubuntu x64: there is no hosted
          # armv7 runner, and the hosted arm64 runners (Cobalt 100) dropped
          # 32-bit AArch32 execution, so emulation is the only option. The
          # binaries run inside linux/arm/v7 containers - Debian for the
          # glibc target (it needs an armhf userland), Alpine for musl.
          - runner: depot-ubuntu-latest
            runner-name: ubuntu-armv7-qemu
            test-targets: "linux-arm,linux-musl-arm"
            qemu: true
          # Test macOS binaries on macOS x64
          - runner: macos-15-intel
            runner-name: macos-x64
            test-targets: "osx-x64"
          # Test macOS binaries on macOS ARM64
          - runner: depot-macos-latest
            runner-name: macos-arm64
            test-targets: "osx-arm64"
          # Test Windows x64 binaries on Windows x64. The windows-host builds
          # are MSVC-linked (package inert there); the others are zig-linked
          # by the shim's link personality, so this is where the MinGW-glued
          # binaries prove they actually run.
          - runner: depot-windows-latest
            runner-name: windows-x64
            test-targets: "win-x64"
          # Test Windows ARM64 binaries on the hosted arm64 Windows runner.
          - runner: windows-11-arm
            runner-name: windows-arm64
            test-targets: "win-arm64"
    runs-on: ${{ matrix.runner }}
    name: Validate on ${{ matrix.runner-name }}
    
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8

      # Registers qemu-user binfmt handlers so docker can run linux/arm/v7
      # containers on the x64 runner. Images are pulled up front so the pull
      # time never eats into the per-binary execution timeout.
      - name: Set up QEMU for armv7
        if: matrix.qemu == true
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm

      - name: Pre-pull armv7 test images
        if: matrix.qemu == true
        run: |
          docker pull --platform linux/arm/v7 debian:bookworm-slim
          docker pull --platform linux/arm/v7 alpine:3.21

      - name: Test binaries from all host platforms
        shell: bash
        run: |
          echo "=== Cross-Platform Binary Validation Report ==="
          echo "Runner: ${{ matrix.runner-name }}"
          echo "Testing targets: ${{ matrix.test-targets }}"
          echo "From host sources: ${{ needs.setup.outputs.host-sources }}"
          echo "Timestamp: $(date -u)"
          echo ""
          
          # Parse host sources and targets
          IFS=',' read -ra HOST_ARRAY <<< "${{ needs.setup.outputs.host-sources }}"
          IFS=',' read -ra TARGET_ARRAY <<< "${{ matrix.test-targets }}"

          # macOS runners have no GNU `timeout` (coreutils installs it as
          # `gtimeout`); without this fallback every execution test on the
          # macOS runners fails with exit 127 before even starting the binary.
          if command -v timeout >/dev/null 2>&1; then
            run_with_timeout() { timeout 10s "$@"; }
          elif command -v gtimeout >/dev/null 2>&1; then
            run_with_timeout() { gtimeout 10s "$@"; }
          else
            run_with_timeout() { perl -e 'alarm shift; exec @ARGV' 10 "$@"; }
          fi

          # armv7 binaries execute inside arm/v7 containers via the QEMU
          # binfmt handlers registered above; everything else runs natively.
          # Emulation is slow, so the container path gets a longer timeout.
          # Arguments after the binary path are passed through to it.
          run_binary() {
            if [[ "${{ matrix.qemu }}" == "true" ]]; then
              local image="debian:bookworm-slim"
              [[ "$1" == */linux-musl-*/* ]] && image="alpine:3.21"
              timeout 120s docker run --rm --platform linux/arm/v7 \
                -v "$PWD:/work" -w /work "$image" "/work/$1" "${@:2}"
            else
              run_with_timeout "$@"
            fi
          }
          
          success_count=0
          total_count=0
          
          # First, list all available artifacts
          echo "Available artifacts:"
          ls -la . || echo "No artifacts directory found"
          echo ""
          
          for host in "${HOST_ARRAY[@]}"; do
            echo "--- Testing binaries built from $host ---"
            
            if [ ! -d "binaries-$host" ]; then
              echo "❌ No artifacts found for host: $host"
              continue
            fi
            
            echo "Available targets for $host:"
            ls -la "binaries-$host/" || echo "No targets found"
            echo ""
            
            for target in "${TARGET_ARRAY[@]}"; do
              binary_name="Hello"
              [[ "$target" == win-* ]] && binary_name="Hello.exe"
              [[ "$target" == lib-* ]] && binary_name="HelloLib.so"
              binary_path="binaries-$host/$target/$binary_name"
              skip_file="binaries-$host/$target/SKIPPED.txt"
              
              total_count=$((total_count + 1))
              
              echo -n "Testing $host -> $target: "
              
              # Check if this build was skipped
              if [ -f "$skip_file" ]; then
                echo "⚠️ SKIPPED - $(cat "$skip_file")"
                continue
              fi
              
              if [ ! -f "$binary_path" ]; then
                echo "❌ Binary not found: $binary_path"
                continue
              fi
              
              # Show binary info
              echo ""
              echo "  Binary found: $binary_path"
              ls -la "$binary_path"
              
              if command -v file >/dev/null 2>&1; then
                echo "  File type: $(file "$binary_path")"
              fi
              
              # Make executable
              chmod +x "$binary_path"

              # macOS binaries: verify the code signature before running.
              # osx-x64 was signed with the CI test certificate by the build
              # job; osx-arm64 carries zig's ad-hoc linker signature. Both
              # must pass strict verification.
              if [[ "$target" == osx-* ]]; then
                echo -n "  Signature check: "
                if ! codesign --verify --strict "$binary_path"; then
                  echo "❌ FAIL - invalid code signature"
                  continue
                fi
                if [[ "$target" == "osx-x64" ]] && ! codesign -dvv "$binary_path" 2>&1 | grep -q "AotAnywhere CI Test"; then
                  echo "❌ FAIL - not signed with the CI test certificate"
                  continue
                fi
                echo "✅ valid"

                # The publish must have stripped local symbols and stabs at
                # link time (ld64 -x/-S, issue #62): unstripped output carries
                # tens of thousands of ILC locals + stabs, stripped output a
                # couple hundred zig-synthesized thunks. Externals don't count
                # - ILC 8 emits ~14k that link-time stripping cannot remove.
                echo -n "  Strip check: "
                local_count=$(nm -a "$binary_path" 2>/dev/null | awk '$2 == "-" || $2 ~ /^[a-z]$/' | wc -l | tr -d ' ')
                if [ "$local_count" -ge 5000 ]; then
                  echo "❌ FAIL - $local_count local symbols; the link-time strip did not run"
                  continue
                fi
                echo "✅ stripped ($local_count local symbols)"
              fi

              # Linux binaries were stripped by the shim's llvm-objcopy
              # personality (StripSymbols defaults to true). Check that
              # binutils can parse the rewritten section table, the debug
              # link is in place and the symbol/debug sections are gone.
              if [[ ( "$target" == linux-* || "$target" == lib-linux-* ) ]] && command -v readelf >/dev/null 2>&1; then
                echo -n "  Strip check: "
                if ! readelf -S "$binary_path" > /tmp/sections.txt 2>&1; then
                  echo "❌ FAIL - readelf could not parse the binary"
                  continue
                fi
                if ! grep -q '\.gnu_debuglink' /tmp/sections.txt; then
                  echo "❌ FAIL - .gnu_debuglink section missing"
                  continue
                fi
                if grep -qE '\.symtab|\.debug_info' /tmp/sections.txt; then
                  echo "❌ FAIL - symbol/debug sections still present"
                  continue
                fi
                echo "✅ stripped, debuglink present"
              fi

              # Shared libraries cannot be executed; load them and call the
              # hello_add export via ctypes instead.
              if [[ "$target" == lib-* ]]; then
                echo -n "  Load test: "
                if output=$(python3 -c "import ctypes, sys; lib = ctypes.CDLL(sys.argv[1]); lib.hello_add.restype = ctypes.c_int; lib.hello_add.argtypes = [ctypes.c_int, ctypes.c_int]; print('sum', lib.hello_add(2, 3))" "$PWD/$binary_path" 2>&1) && [[ "$output" == "sum 5" ]]; then
                  echo "✅ SUCCESS - hello_add(2,3) = 5"
                  success_count=$((success_count + 1))
                else
                  echo "❌ FAIL - $output"
                fi
                echo ""
                continue
              fi

              # The selftest variants exercise real ICU, zlib and OpenSSL at
              # run time; everything else prints Hello World.
              expected_output="Hello World"
              run_args=()
              if [[ "$target" == *-selftest* ]]; then
                expected_output="selftest ok"
                run_args=(--selftest)
              fi

              # Try to run the binary with timeout
              echo -n "  Execution test: "
              if run_binary "$binary_path" ${run_args[@]+"${run_args[@]}"} > /tmp/output.txt 2>&1; then
                # tr strips the \r that Windows console output leaves in the line.
                output=$(tr -d '\r' < /tmp/output.txt)
                if [[ "$output" == "$expected_output" ]]; then
                  echo "✅ SUCCESS - Output: '$output'"
                  success_count=$((success_count + 1))
                else
                  echo "❌ FAIL - Unexpected output: '$output'"
                fi
              else
                exit_code=$?
                output=$(cat /tmp/output.txt 2>/dev/null || echo "No output captured")
                echo "❌ FAIL - Exit code: $exit_code"
                echo "  Error output: $output"
                
                # Try to get more diagnostic info
                if command -v ldd >/dev/null 2>&1 && [[ "$target" == linux-* ]]; then
                  echo "  Library dependencies:"
                  ldd "$binary_path" 2>&1 | head -20
                elif command -v otool >/dev/null 2>&1 && [[ "$target" == osx-* ]]; then
                  echo "  Library dependencies:"
                  otool -L "$binary_path" 2>&1 | head -20
                fi
              fi
              
              echo ""
            done
            echo ""
          done
          
          echo "=== Summary ==="
          echo "Successful tests: $success_count/$total_count"
          if [ $total_count -gt 0 ]; then
            echo "Success rate: $(( success_count * 100 / total_count ))%"
          else
            echo "Success rate: N/A (no tests run)"
          fi
          
          if [ $success_count -eq $total_count ] && [ $total_count -gt 0 ]; then
            echo "🎉 All tests passed!"
            exit 0
          elif [ $total_count -eq 0 ]; then
            echo "⚠️  No tests were run - this might indicate missing artifacts"
            exit 1
          else
            # Fail the job: the report job still runs (if: always()), and a
            # green check must mean the binaries actually ran. Soft-failing
            # here hid a broken `timeout` on the macOS runners for months.
            echo "❌ Some tests failed. See details above."
            exit 1
          fi

  # Report: Summarize the platform support matrix
  report:
    needs: [build, validate, setup]
    if: always()
    runs-on: depot-ubuntu-latest
    name: Platform Support Report

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        continue-on-error: true

      - name: Generate platform support matrix
        shell: bash
        # The hosts this run actually built (minimal set by default, all five
        # on a full-matrix dispatch); the report columns/rows follow suit so a
        # minimal run doesn't show the unbuilt hosts as spurious failures.
        env:
          ACTIVE_HOSTS: ${{ needs.setup.outputs.host-sources }}
        run: |
          echo "# 🏗️ AotAnywhere Platform Support Matrix" > platform-report.md
          echo "" >> platform-report.md
          echo "This report shows the current status of cross-compilation support:" >> platform-report.md
          echo "" >> platform-report.md
          
          echo "## Host Platform Support" >> platform-report.md
          echo "" >> platform-report.md
          echo "| Host Platform | Status | Target Platforms Built | Details |" >> platform-report.md
          echo "|---------------|---------|------------------------|---------|" >> platform-report.md
          
          # Check which artifacts exist
          for host in ${ACTIVE_HOSTS//,/ }; do
            if [ -d "binaries-$host" ]; then
              target_count=$(ls "binaries-$host" 2>/dev/null | wc -l)
              targets=$(ls "binaries-$host" 2>/dev/null | tr '\n' ', ' | sed 's/,$//')
              
              # Count successful builds
              success_count=0
              for target_dir in binaries-$host/*/; do
                if [ -f "${target_dir}Hello" ] || [ -f "${target_dir}Hello.exe" ]; then
                  success_count=$((success_count + 1))
                fi
              done
              
              if [ $success_count -eq $target_count ] && [ $target_count -gt 0 ]; then
                status="✅ All targets built"
              elif [ $success_count -gt 0 ]; then
                status="⚠️ Partial success ($success_count/$target_count)"
              else
                status="❌ Build failed"
              fi
              
              echo "| $host | $status | $targets | $success_count/$target_count binaries |" >> platform-report.md
            else
              echo "| $host | ❌ No artifacts | - | Build job may have failed |" >> platform-report.md
            fi
          done
          
          echo "" >> platform-report.md
          echo "## Target Platform Support" >> platform-report.md
          echo "" >> platform-report.md

          # One "Host" column per host this run built (see the setup job); a
          # minimal run has three, a full-matrix run five.
          host_label() {
            case "$1" in
              windows)     echo "Windows Host" ;;
              linux)       echo "Linux Host" ;;
              macos-x64)   echo "macOS x64 Host" ;;
              macos-arm64) echo "macOS ARM64 Host" ;;
              linux-arm64) echo "Linux ARM64 Host" ;;
              *)           echo "$1 Host" ;;
            esac
          }
          header="| Target Platform |"
          divider="|-----------------|"
          for host in ${ACTIVE_HOSTS//,/ }; do
            header="$header $(host_label "$host") |"
            divider="$divider---|"
          done
          header="$header Runtime Validation |"
          divider="$divider-------------------|"
          echo "$header" >> platform-report.md
          echo "$divider" >> platform-report.md

          for target in linux-x64 linux-arm64 linux-arm linux-musl-x64 linux-musl-arm64 linux-musl-arm osx-x64 osx-arm64 win-x64 win-arm64; do
            bin="Hello"
            [[ "$target" == win-* ]] && bin="Hello.exe"
            row="| $target |"
            # Runtime validation: every built target has a native validation
            # runner (x64/ARM64 Linux and Windows, both macOS architectures).
            runtime_status="❌ No binaries"
            for host in ${ACTIVE_HOSTS//,/ }; do
              if [ -f "binaries-$host/$target/$bin" ]; then
                row="$row ✅ |"
                runtime_status="✅ Testable"
              else
                row="$row ❌ |"
              fi
            done
            row="$row $runtime_status |"
            echo "$row" >> platform-report.md
          done
          
          echo "" >> platform-report.md
          echo "## Build Details" >> platform-report.md
          echo "" >> platform-report.md
          
          # Add build size information if available
          echo "### Binary Sizes" >> platform-report.md
          echo "" >> platform-report.md
          echo "| Host → Target | Binary Size | Architecture |" >> platform-report.md
          echo "|---------------|-------------|--------------|" >> platform-report.md

          for host in ${ACTIVE_HOSTS//,/ }; do
            if [ -d "binaries-$host" ]; then
              for target_dir in binaries-$host/*/; do
                bin="${target_dir}Hello"
                [ -f "${target_dir}Hello.exe" ] && bin="${target_dir}Hello.exe"
                if [ -f "$bin" ]; then
                  target=$(basename "$target_dir")
                  size_info=$(ls -lh "$bin" | awk '{print $5}')

                  # Get architecture info if file command is available
                  arch_info="Unknown"
                  if command -v file >/dev/null 2>&1; then
                    arch_info=$(file "$bin" | cut -d',' -f2 | xargs)
                  fi

                  echo "| $host → $target | $size_info | $arch_info |" >> platform-report.md
                fi
              done
            fi
          done
          
          echo "" >> platform-report.md
          echo "## Legend" >> platform-report.md
          echo "- ✅ : Supported and working" >> platform-report.md
          echo "- ⚠️ : Partially working or some issues" >> platform-report.md
          echo "- ❌ : Failed or not supported" >> platform-report.md
          echo "" >> platform-report.md
          echo "## Additional Notes" >> platform-report.md
          echo "- This matrix shows cross-compilation capabilities from different host platforms" >> platform-report.md
          echo "- Builds run from the selected host platforms ($ACTIVE_HOSTS); a full-matrix dispatch adds the macOS x64 and Linux arm64 hosts" >> platform-report.md
          echo "- Runtime validation covers Linux, macOS and Windows (x64 and ARM64) targets on matching hosted runners; ARMv7 targets run under QEMU in arm/v7 containers" >> platform-report.md
          echo "- All builds use .NET 8.0 with Native AOT and Zig for cross-compilation, except the ARMv7 targets which use .NET 9.0 (their ILCompiler packs only ship for .NET 9+)" >> platform-report.md
          echo "" >> platform-report.md
          echo "Generated on: $(date -u)" >> platform-report.md
          
          # Display the report
          echo ""
          echo "==================== PLATFORM SUPPORT REPORT ===================="
          cat platform-report.md
          echo "=================================================================="
          
          # Add the report to the GitHub Actions workflow summary
          cat platform-report.md >> $GITHUB_STEP_SUMMARY
      
      - name: Upload platform report
        uses: actions/upload-artifact@v7
        with:
          name: platform-support-report
          path: platform-report.md
          retention-days: 30