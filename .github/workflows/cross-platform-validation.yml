name: Cross-Platform Validation

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  # rcodesign (https://github.com/indygreg/apple-platform-rs) generates the
  # test signing certificate, signs macOS binaries during the build matrix
  # (via the AotAnywhere signing properties) and verifies the results.
  # Deliberately NOT named RCODESIGN_*: rcodesign feeds env vars with that
  # prefix into its config loader and errors on unknown keys.
  APPLE_CODESIGN_VERSION: 0.29.0

jobs:
  # Build the prebuilt clang shims once, on a host whose zig can cross-compile
  # every host's shim. The build jobs below consume these instead of compiling
  # the shim on demand — which some hosts' zig cannot do at all (arm64-Windows
  # zig 0.16 segfaults in build-exe). This mirrors how real consumers use the
  # shipped package: the shim is prebuilt, not compiled on their machine.
  pack:
    # windows-latest (win-x64) is proven to cross-compile all seven shims; its
    # zig is fine. (It is arm64-Windows zig specifically whose build-exe is broken.)
    runs-on: windows-latest
    name: Build prebuilt shims
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - name: Build NuGet package (all host shims)
        run: dotnet build -t:Pack src/AotAnywhere.nuproj
      - name: Upload prebuilt shims
        uses: actions/upload-artifact@v7
        with:
          name: prebuilt-shims
          path: src/obj/shim/

  # Generate a throwaway self-signed Developer ID-style certificate that the
  # build jobs use to exercise the signing integration. Generated once here:
  # rcodesign emits a PEM pair, and Ubuntu's OpenSSL converts it to a PKCS#12
  # file with -legacy — the PFX encryption rcodesign can read back.
  test-cert:
    runs-on: ubuntu-latest
    name: Generate test signing certificate
    steps:
      - name: Generate self-signed signing certificate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "apple-codesign/$APPLE_CODESIGN_VERSION" \
            -R indygreg/apple-platform-rs \
            -p "apple-codesign-$APPLE_CODESIGN_VERSION-x86_64-unknown-linux-musl.tar.gz"
          tar xzf apple-codesign-*.tar.gz --strip-components=1
          mkdir test-cert
          ./rcodesign generate-self-signed-certificate \
            --person-name "AotAnywhere CI Test" \
            --profile developer-id-application \
            --pem-filename test-cert/cert
          openssl pkcs12 -export -legacy \
            -inkey test-cert/cert.key -in test-cert/cert.crt \
            -out test-cert/cert.p12 -passout pass:citest
          printf citest > test-cert/cert.pass
          rm test-cert/cert.key test-cert/cert.crt
      - name: Upload test certificate
        uses: actions/upload-artifact@v7
        with:
          name: test-signing-cert
          path: test-cert/

  # Build matrix: Test building from different host platforms to different target platforms
  build:
    needs: [pack, test-cert]
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows host builds
          - host: windows-latest
            host-name: windows
            targets: "linux-x64,linux-arm64,linux-musl-x64,linux-musl-arm64,osx-x64,osx-arm64"
          
          # Linux host builds
          - host: ubuntu-latest
            host-name: linux
            targets: "linux-x64,linux-arm64,linux-musl-x64,linux-musl-arm64,osx-x64,osx-arm64"
          
          # macOS x64 host builds
          - host: macos-15-intel
            host-name: macos-x64
            targets: "linux-x64,linux-arm64,linux-musl-x64,linux-musl-arm64,osx-x64,osx-arm64"
          
          # macOS ARM64 host builds
          - host: macos-latest
            host-name: macos-arm64
            targets: "linux-x64,linux-arm64,linux-musl-x64,linux-musl-arm64,osx-x64,osx-arm64"

          # Linux ARM64 host builds
          - host: ubuntu-24.04-arm
            host-name: linux-arm64
            targets: "linux-x64,linux-arm64,linux-musl-x64,linux-musl-arm64,osx-x64,osx-arm64"

    runs-on: ${{ matrix.host }}
    name: Build from ${{ matrix.host-name }}
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      
      # Drop the prebuilt shims where StuDev.AotAnywhere.targets looks for them
      # (src/shim/<host-rid>), so the publishes below use this host's prebuilt
      # shim instead of compiling one — required on hosts whose zig can't.
      - name: Download prebuilt shims
        uses: actions/download-artifact@v8
        with:
          name: prebuilt-shims
          path: src/shim

      - name: Download test signing certificate
        uses: actions/download-artifact@v8
        with:
          name: test-signing-cert
          path: test-cert

      # The osx-x64 publishes below sign via the AotAnywhere rcodesign
      # integration, so every build host needs rcodesign on PATH.
      - name: Install rcodesign
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64)         asset="x86_64-unknown-linux-musl.tar.gz" ;;
            Linux-aarch64)        asset="aarch64-unknown-linux-musl.tar.gz" ;;
            Darwin-*)             asset="macos-universal.tar.gz" ;;
            MINGW*|MSYS*|CYGWIN*) asset="x86_64-pc-windows-msvc.zip" ;;
            *) echo "No rcodesign asset for $(uname -s)-$(uname -m)"; exit 1 ;;
          esac
          mkdir .rcodesign && cd .rcodesign
          gh release download "apple-codesign/$APPLE_CODESIGN_VERSION" \
            -R indygreg/apple-platform-rs \
            -p "apple-codesign-$APPLE_CODESIGN_VERSION-$asset"
          if [[ "$asset" == *.zip ]]; then
            unzip -q apple-codesign-*.zip || python -m zipfile -e apple-codesign-*.zip .
          else
            tar xzf apple-codesign-*.tar.gz
          fi
          mv apple-codesign-*/rcodesign* .
          ./rcodesign --version

      - name: Build and publish for all target platforms
        shell: bash
        env:
          ZIG_SHIM_DEBUG: "1"
        run: |
          # Split the targets and build each one
          IFS=',' read -ra TARGET_ARRAY <<< "${{ matrix.targets }}"

          # rcodesign is invoked by the SignMacOsBinary target for osx-x64
          export PATH="$PWD/.rcodesign:$PATH"

          build_success=true
          
          for target in "${TARGET_ARRAY[@]}"; do
            echo "=========================================="
            echo "Building for target: $target"
            echo "=========================================="
            
            # Create output directory
            mkdir -p "artifacts/${{ matrix.host-name }}/$target"
            
            # Determine if this is a cross-compilation or native build
            if [[ "$target" == linux-* ]]; then
              echo "Cross-compiling to Linux target using AotAnywhere..."
              # Build for Linux targets using AotAnywhere
              if dotnet publish test/Hello.csproj \
                -r "$target" \
                -c Release \
                -p:StripSymbols=false \
                -p:InvariantGlobalization=true \
                --output "artifacts/${{ matrix.host-name }}/$target"; then
                
                echo "✅ Cross-compilation build succeeded for $target"
                build_result="success"
              else
                echo "❌ Cross-compilation build failed for $target"
                build_result="failed"
              fi
            elif [[ "$target" == osx-* ]]; then
              echo "Cross-compiling to macOS target using AotAnywhere..."
              # osx-x64 is signed with the throwaway CI certificate to
              # exercise the rcodesign signing integration from every host;
              # osx-arm64 is left with zig's default ad-hoc signature so that
              # path stays covered too.
              sign_args=()
              if [[ "$target" == "osx-x64" ]]; then
                p12="$PWD/test-cert/cert.p12"
                pass="$PWD/test-cert/cert.pass"
                if command -v cygpath >/dev/null 2>&1; then
                  p12=$(cygpath -w "$p12")
                  pass=$(cygpath -w "$pass")
                fi
                sign_args=(
                  "-p:AotAnywhereSignP12File=$p12"
                  "-p:AotAnywhereSignP12PasswordFile=$pass"
                )
              fi
              # For macOS targets, use AotAnywhere for cross-compilation
              if dotnet publish test/Hello.csproj \
                -r "$target" \
                -c Release \
                -p:StripSymbols=false \
                -p:InvariantGlobalization=true \
                "${sign_args[@]}" \
                --output "artifacts/${{ matrix.host-name }}/$target"; then
                
                echo "✅ Cross-compilation build succeeded for $target"
                build_result="success"
              else
                echo "❌ Cross-compilation build failed for $target"
                build_result="failed"
              fi
            else
              echo "❌ Unknown target platform: $target"
              build_result="failed"
            fi
            
            # Verify the binary was created (if build was successful)
            if [[ "$build_result" == "success" ]]; then
              binary_name="Hello"
              
              if [ -f "artifacts/${{ matrix.host-name }}/$target/$binary_name" ]; then
                echo "✅ Binary confirmed: $binary_name for $target"
                
                # Show file info
                ls -la "artifacts/${{ matrix.host-name }}/$target/$binary_name"
                
                # Show binary type if file command is available
                if command -v file >/dev/null 2>&1; then
                  file "artifacts/${{ matrix.host-name }}/$target/$binary_name"
                fi
                
                # Try to get binary size
                size_kb=$(du -k "artifacts/${{ matrix.host-name }}/$target/$binary_name" | cut -f1)
                echo "Binary size: ${size_kb}KB"

                # Assert the signing integration actually signed osx-x64
                if [[ "$target" == "osx-x64" ]]; then
                  if rcodesign print-signature-info "artifacts/${{ matrix.host-name }}/$target/$binary_name" | grep -q "AotAnywhere CI Test"; then
                    echo "✅ Signature check: signed with the CI test certificate"
                  else
                    echo "❌ Signature check: expected CI test certificate signature not found"
                    build_success=false
                  fi
                fi

              else
                echo "❌ Binary not found after successful build: $binary_name for $target"
                echo "Contents of output directory:"
                ls -la "artifacts/${{ matrix.host-name }}/$target/" || echo "Output directory not found"
                build_success=false
              fi
            elif [[ "$build_result" == "failed" ]]; then
              build_success=false
            fi
            # Note: "skipped" builds don't count as failures
            
            echo ""
          done
          
          if [ "$build_success" = false ]; then
            echo "❌ One or more builds failed"
            # Don't exit here - let the workflow continue to upload artifacts for successful builds
            echo "build_success=false" >> $GITHUB_OUTPUT
          else
            echo "🎉 All builds completed successfully!"
            echo "build_success=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        if: always()  # Upload artifacts even if some builds failed
        with:
          name: binaries-${{ matrix.host-name }}
          path: artifacts/${{ matrix.host-name }}/
          retention-days: 7

  # Validation: Test running the built binaries where possible
  validate:
    needs: build
    if: always() # Run even if some builds failed
    strategy:
      fail-fast: false
      matrix:
        include:
          # Test x64 binaries on Ubuntu x64
          - runner: ubuntu-latest
            runner-name: ubuntu-x64
            test-targets: "linux-x64,linux-musl-x64"
            host-sources: "windows,linux,macos-x64,macos-arm64,linux-arm64"
          # Test ARM64 binaries on Ubuntu ARM64 (now runnable on hosted ARM runners)
          - runner: ubuntu-24.04-arm
            runner-name: ubuntu-arm64
            test-targets: "linux-arm64,linux-musl-arm64"
            host-sources: "windows,linux,macos-x64,macos-arm64,linux-arm64"
          # Test macOS binaries on macOS x64
          - runner: macos-15-intel
            runner-name: macos-x64
            test-targets: "osx-x64"
            host-sources: "windows,linux,macos-x64,macos-arm64,linux-arm64"
          # Test macOS binaries on macOS ARM64
          - runner: macos-latest
            runner-name: macos-arm64
            test-targets: "osx-arm64"
            host-sources: "windows,linux,macos-x64,macos-arm64,linux-arm64"
    
    runs-on: ${{ matrix.runner }}
    name: Validate on ${{ matrix.runner-name }}
    
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
      
      - name: Test binaries from all host platforms
        shell: bash
        run: |
          echo "=== Cross-Platform Binary Validation Report ==="
          echo "Runner: ${{ matrix.runner-name }}"
          echo "Testing targets: ${{ matrix.test-targets }}"
          echo "From host sources: ${{ matrix.host-sources }}"
          echo "Timestamp: $(date -u)"
          echo ""
          
          # Parse host sources and targets
          IFS=',' read -ra HOST_ARRAY <<< "${{ matrix.host-sources }}"
          IFS=',' read -ra TARGET_ARRAY <<< "${{ matrix.test-targets }}"

          # macOS runners have no GNU `timeout` (coreutils installs it as
          # `gtimeout`); without this fallback every execution test on the
          # macOS runners fails with exit 127 before even starting the binary.
          if command -v timeout >/dev/null 2>&1; then
            run_with_timeout() { timeout 10s "$@"; }
          elif command -v gtimeout >/dev/null 2>&1; then
            run_with_timeout() { gtimeout 10s "$@"; }
          else
            run_with_timeout() { perl -e 'alarm shift; exec @ARGV' 10 "$@"; }
          fi
          
          success_count=0
          total_count=0
          
          # First, list all available artifacts
          echo "Available artifacts:"
          ls -la . || echo "No artifacts directory found"
          echo ""
          
          for host in "${HOST_ARRAY[@]}"; do
            echo "--- Testing binaries built from $host ---"
            
            if [ ! -d "binaries-$host" ]; then
              echo "❌ No artifacts found for host: $host"
              continue
            fi
            
            echo "Available targets for $host:"
            ls -la "binaries-$host/" || echo "No targets found"
            echo ""
            
            for target in "${TARGET_ARRAY[@]}"; do
              binary_path="binaries-$host/$target/Hello"
              skip_file="binaries-$host/$target/SKIPPED.txt"
              
              total_count=$((total_count + 1))
              
              echo -n "Testing $host -> $target: "
              
              # Check if this build was skipped
              if [ -f "$skip_file" ]; then
                echo "⚠️ SKIPPED - $(cat "$skip_file")"
                continue
              fi
              
              if [ ! -f "$binary_path" ]; then
                echo "❌ Binary not found: $binary_path"
                continue
              fi
              
              # Show binary info
              echo ""
              echo "  Binary found: $binary_path"
              ls -la "$binary_path"
              
              if command -v file >/dev/null 2>&1; then
                echo "  File type: $(file "$binary_path")"
              fi
              
              # Make executable
              chmod +x "$binary_path"

              # macOS binaries: verify the code signature before running.
              # osx-x64 was signed with the CI test certificate by the build
              # job; osx-arm64 carries zig's ad-hoc linker signature. Both
              # must pass strict verification.
              if [[ "$target" == osx-* ]]; then
                echo -n "  Signature check: "
                if ! codesign --verify --strict "$binary_path"; then
                  echo "❌ FAIL - invalid code signature"
                  continue
                fi
                if [[ "$target" == "osx-x64" ]] && ! codesign -dvv "$binary_path" 2>&1 | grep -q "AotAnywhere CI Test"; then
                  echo "❌ FAIL - not signed with the CI test certificate"
                  continue
                fi
                echo "✅ valid"
              fi

              # Try to run the binary with timeout
              echo -n "  Execution test: "
              if run_with_timeout "$binary_path" > /tmp/output.txt 2>&1; then
                output=$(cat /tmp/output.txt)
                if [[ "$output" == "Hello World" ]]; then
                  echo "✅ SUCCESS - Output: '$output'"
                  success_count=$((success_count + 1))
                else
                  echo "❌ FAIL - Unexpected output: '$output'"
                fi
              else
                exit_code=$?
                output=$(cat /tmp/output.txt 2>/dev/null || echo "No output captured")
                echo "❌ FAIL - Exit code: $exit_code"
                echo "  Error output: $output"
                
                # Try to get more diagnostic info
                if command -v ldd >/dev/null 2>&1 && [[ "$target" == linux-* ]]; then
                  echo "  Library dependencies:"
                  ldd "$binary_path" 2>&1 | head -20
                elif command -v otool >/dev/null 2>&1 && [[ "$target" == osx-* ]]; then
                  echo "  Library dependencies:"
                  otool -L "$binary_path" 2>&1 | head -20
                fi
              fi
              
              echo ""
            done
            echo ""
          done
          
          echo "=== Summary ==="
          echo "Successful tests: $success_count/$total_count"
          if [ $total_count -gt 0 ]; then
            echo "Success rate: $(( success_count * 100 / total_count ))%"
          else
            echo "Success rate: N/A (no tests run)"
          fi
          
          if [ $success_count -eq $total_count ] && [ $total_count -gt 0 ]; then
            echo "🎉 All tests passed!"
            exit 0
          elif [ $total_count -eq 0 ]; then
            echo "⚠️  No tests were run - this might indicate missing artifacts"
            exit 1
          else
            # Fail the job: the report job still runs (if: always()), and a
            # green check must mean the binaries actually ran. Soft-failing
            # here hid a broken `timeout` on the macOS runners for months.
            echo "❌ Some tests failed. See details above."
            exit 1
          fi

  # Report: Summarize the platform support matrix
  report:
    needs: [build, validate]
    if: always()
    runs-on: ubuntu-latest
    name: Platform Support Report
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        continue-on-error: true
      
      - name: Generate platform support matrix
        shell: bash
        run: |
          echo "# 🏗️ AotAnywhere Platform Support Matrix" > platform-report.md
          echo "" >> platform-report.md
          echo "This report shows the current status of cross-compilation support:" >> platform-report.md
          echo "" >> platform-report.md
          
          echo "## Host Platform Support" >> platform-report.md
          echo "" >> platform-report.md
          echo "| Host Platform | Status | Target Platforms Built | Details |" >> platform-report.md
          echo "|---------------|---------|------------------------|---------|" >> platform-report.md
          
          # Check which artifacts exist
          for host in windows linux macos-x64 macos-arm64 linux-arm64; do
            if [ -d "binaries-$host" ]; then
              target_count=$(ls "binaries-$host" 2>/dev/null | wc -l)
              targets=$(ls "binaries-$host" 2>/dev/null | tr '\n' ', ' | sed 's/,$//')
              
              # Count successful builds
              success_count=0
              for target_dir in binaries-$host/*/; do
                if [ -f "${target_dir}Hello" ]; then
                  success_count=$((success_count + 1))
                fi
              done
              
              if [ $success_count -eq $target_count ] && [ $target_count -gt 0 ]; then
                status="✅ All targets built"
              elif [ $success_count -gt 0 ]; then
                status="⚠️ Partial success ($success_count/$target_count)"
              else
                status="❌ Build failed"
              fi
              
              echo "| $host | $status | $targets | $success_count/$target_count binaries |" >> platform-report.md
            else
              echo "| $host | ❌ No artifacts | - | Build job may have failed |" >> platform-report.md
            fi
          done
          
          echo "" >> platform-report.md
          echo "## Target Platform Support" >> platform-report.md
          echo "" >> platform-report.md
          echo "| Target Platform | Windows Host | Linux Host | macOS x64 Host | macOS ARM64 Host | Linux ARM64 Host | Runtime Validation |" >> platform-report.md
          echo "|-----------------|--------------|------------|----------------|------------------|------------------|-------------------|" >> platform-report.md

          for target in linux-x64 linux-arm64 linux-musl-x64 linux-musl-arm64 osx-x64 osx-arm64; do
            win_status="❌"
            linux_status="❌"
            mac_x64_status="❌"
            mac_arm64_status="❌"
            linux_arm64_status="❌"
            runtime_status="❌ No binaries"

            # Check build status
            [ -f "binaries-windows/$target/Hello" ] && win_status="✅"
            [ -f "binaries-linux/$target/Hello" ] && linux_status="✅"
            [ -f "binaries-macos-x64/$target/Hello" ] && mac_x64_status="✅"
            [ -f "binaries-macos-arm64/$target/Hello" ] && mac_arm64_status="✅"
            [ -f "binaries-linux-arm64/$target/Hello" ] && linux_arm64_status="✅"

            # Runtime validation: every target now has a validation runner
            # (x64 and ARM64 Linux, plus both macOS architectures).
            for host in windows linux macos-x64 macos-arm64 linux-arm64; do
              if [ -f "binaries-$host/$target/Hello" ]; then
                runtime_status="✅ Testable"
                break
              fi
            done

            echo "| $target | $win_status | $linux_status | $mac_x64_status | $mac_arm64_status | $linux_arm64_status | $runtime_status |" >> platform-report.md
          done
          
          echo "" >> platform-report.md
          echo "## Build Details" >> platform-report.md
          echo "" >> platform-report.md
          
          # Add build size information if available
          echo "### Binary Sizes" >> platform-report.md
          echo "" >> platform-report.md
          echo "| Host → Target | Binary Size | Architecture |" >> platform-report.md
          echo "|---------------|-------------|--------------|" >> platform-report.md
          
          for host in windows linux macos-x64 macos-arm64 linux-arm64; do
            if [ -d "binaries-$host" ]; then
              for target_dir in binaries-$host/*/; do
                if [ -f "${target_dir}Hello" ]; then
                  target=$(basename "$target_dir")
                  size_info=$(ls -lh "${target_dir}Hello" | awk '{print $5}')
                  
                  # Get architecture info if file command is available
                  arch_info="Unknown"
                  if command -v file >/dev/null 2>&1; then
                    arch_info=$(file "${target_dir}Hello" | cut -d',' -f2 | xargs)
                  fi
                  
                  echo "| $host → $target | $size_info | $arch_info |" >> platform-report.md
                fi
              done
            fi
          done
          
          echo "" >> platform-report.md
          echo "## Legend" >> platform-report.md
          echo "- ✅ : Supported and working" >> platform-report.md
          echo "- ⚠️ : Partially working or some issues" >> platform-report.md
          echo "- ❌ : Failed or not supported" >> platform-report.md
          echo "" >> platform-report.md
          echo "## Additional Notes" >> platform-report.md
          echo "- This matrix shows cross-compilation capabilities from different host platforms" >> platform-report.md
          echo "- Builds run from x64 and ARM64 Windows, Linux, and macOS hosts" >> platform-report.md
          echo "- Runtime validation covers Linux (x64 and ARM64) and macOS (x64 and ARM64) targets on matching hosted runners" >> platform-report.md
          echo "- All builds use .NET 8.0 with Native AOT and Zig for cross-compilation" >> platform-report.md
          echo "" >> platform-report.md
          echo "Generated on: $(date -u)" >> platform-report.md
          
          # Display the report
          echo ""
          echo "==================== PLATFORM SUPPORT REPORT ===================="
          cat platform-report.md
          echo "=================================================================="
          
          # Add the report to the GitHub Actions workflow summary
          cat platform-report.md >> $GITHUB_STEP_SUMMARY
      
      - name: Upload platform report
        uses: actions/upload-artifact@v7
        with:
          name: platform-support-report
          path: platform-report.md
          retention-days: 30