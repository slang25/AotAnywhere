name: CI

on:
  pull_request:
    branches: [ master ]

  workflow_dispatch:
    inputs:
      version:
        description: 'Release version to create'     
        required: true

jobs:
  build_and_test:
    strategy:
      matrix:
        include:
          - vm: windows-latest
    runs-on: ${{ matrix.vm }}
    name: Build and test ${{ matrix.vm }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - name: Build (CI)
        if: ${{ github.event.inputs.version == '' }}
        run: |
          dotnet build -t:Pack src/PublishAotCross.nuproj
          dotnet publish -r linux-x64 -c Release test/Hello.csproj -p:StripSymbols=false
      - name: Upload test binary
        if: ${{ github.event.inputs.version == '' }}
        uses: actions/upload-artifact@v7
        with:
          name: Hello
          path: test/bin/Release/net8.0/linux-x64/publish/Hello
      - name: Build (CD)
        if: ${{ github.event.inputs.version != '' }}
        run: dotnet build -t:Pack src/PublishAotCross.nuproj -p:Version=${{ github.event.inputs.version }}
      - name: Archive NuGet
        if: ${{ github.event.inputs.version != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: PublishAotCross.${{ github.event.inputs.version }}.nupkg
          path: src/bin/Debug/PublishAotCross.${{ github.event.inputs.version }}.nupkg
      - name: Create tag
        if: ${{ github.event.inputs.version != '' && github.actor == 'MichalStrehovsky' }}
        run: |
          git tag v${{ github.event.inputs.version }}
          git push origin v${{ github.event.inputs.version }}

  validate:
    needs: build_and_test
    runs-on: ubuntu-latest
    name: Try launching
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
      - name: Launch
        run: |
          # download-artifact places the single-file "Hello" artifact at a path
          # that varies with the action version, so locate the binary rather
          # than hardcoding ./Hello/Hello.
          bin=$(find . -type f -name Hello | head -1)
          if [ -z "$bin" ]; then echo "Hello binary not found" >&2; exit 1; fi
          echo "Launching $bin"
          chmod +x "$bin"
          "$bin"
