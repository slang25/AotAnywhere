name: CI

on:
  pull_request:
    branches: [ master ]

# Releases are driven by publish.yml (dispatch it with a version); this is PR CI
# only. A new push to the same PR supersedes the running build.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zig_version_sync:
    runs-on: ubuntu-latest
    name: ZigVersion drift guard
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
      # Fails the PR if the out-of-band ZigVersion pins (the setup-zig step in
      # apple-sysroot-drift.yml and the prose in .copilot-instructions.md) drift
      # from the single source of truth in src/ZigVersion.props.
      - name: Check ZigVersion is in sync
        run: ./eng/check-zig-version-sync.sh

  build_and_test:
    strategy:
      matrix:
        include:
          - vm: windows-latest
    runs-on: ${{ matrix.vm }}
    name: Build and test ${{ matrix.vm }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      # Pack restores the Vezel zig toolset and the publish pulls the
      # linux-x64 ILCompiler/runtime packs - both sizeable downloads.
      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-ci-${{ runner.os }}-${{ hashFiles('src/AotAnywhere.nuproj', 'src/Crosscompile.targets', 'test/Hello.csproj') }}
          restore-keys: |
            nuget-ci-${{ runner.os }}-
      - name: Build
        shell: bash
        run: |
          dotnet build -t:Pack src/AotAnywhere.nuproj
          # Default publish: StripSymbols=true for Linux targets, served by
          # the shim's llvm-objcopy personality (no LLVM on the runner).
          dotnet publish -r linux-x64 -c Release test/Hello.csproj
          # The strip pipeline must have produced the symbol sidecar.
          test -f test/bin/Release/net8.0/linux-x64/publish/Hello.dbg
      - name: Upload test binary
        uses: actions/upload-artifact@v7
        with:
          name: Hello
          path: test/bin/Release/net8.0/linux-x64/publish/Hello

  validate:
    needs: build_and_test
    runs-on: ubuntu-latest
    name: Try launching
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
      - name: Launch
        run: |
          # download-artifact places the single-file "Hello" artifact at a path
          # that varies with the action version, so locate the binary rather
          # than hardcoding ./Hello/Hello.
          bin=$(find . -type f -name Hello | head -1)
          if [ -z "$bin" ]; then echo "Hello binary not found" >&2; exit 1; fi
          # The binary was stripped by the shim's llvm-objcopy personality;
          # check binutils can parse the rewritten section table and that
          # the strip actually happened, then run it.
          readelf -S "$bin" > sections.txt
          grep -q '\.gnu_debuglink' sections.txt
          if grep -qE '\.symtab|\.debug_info' sections.txt; then echo "strip failed: symbol/debug sections still present" >&2; exit 1; fi
          echo "Launching $bin"
          chmod +x "$bin"
          "$bin"
